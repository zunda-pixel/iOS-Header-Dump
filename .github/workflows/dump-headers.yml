name: Dump iOS Headers

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device identifier (e.g. iPhone18,3)'
        required: true
        default: 'iPhone18,3'
      build:
        description: 'Build ID (e.g. 23F77) — leave empty to use latest signed'
        required: false
        default: ''

jobs:
  dump:
    # セルフホストランナー（macOS）が必要
    # 設定: repo Settings → Actions → Runners → New self-hosted runner
    runs-on: [self-hosted, macOS]
    timeout-minutes: 120

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Install ipsw
        run: |
          if ! command -v ipsw &>/dev/null; then
            brew install blacktop/tap/ipsw
          fi
          ipsw version

      - name: Resolve build ID (if not specified)
        id: firmware
        run: |
          DEVICE="${{ inputs.device }}"
          BUILD="${{ inputs.build }}"

          if [ -z "$BUILD" ]; then
            echo "No build specified, fetching latest signed firmware..."
            python3 - <<'EOF'
          import json, os, subprocess
          device = os.environ['DEVICE']
          result = subprocess.run(
              ['curl', '-sf', f'https://api.ipsw.me/v4/device/{device}'],
              capture_output=True, text=True, check=True
          )
          info = json.loads(result.stdout)
          signed = [f for f in info['firmwares'] if f['signed']]
          signed.sort(key=lambda f: f['releasedate'], reverse=True)
          fw = signed[0]
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"version={fw['version']}\n")
              out.write(f"build={fw['buildid']}\n")
          print(f"Resolved: iOS {fw['version']} ({fw['buildid']})")
          EOF
          else
            python3 - <<'EOF'
          import json, os, subprocess
          device, build = os.environ['DEVICE'], os.environ['BUILD']
          result = subprocess.run(
              ['curl', '-sf', f'https://api.ipsw.me/v4/device/{device}'],
              capture_output=True, text=True, check=True
          )
          info = json.loads(result.stdout)
          fw = next((f for f in info['firmwares'] if f['buildid'] == build), None)
          if not fw:
              raise SystemExit(f"Build {build} not found for {device}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"version={fw['version']}\n")
              out.write(f"build={fw['buildid']}\n")
          print(f"iOS {fw['version']} ({fw['buildid']})")
          EOF
          fi
        env:
          DEVICE: ${{ inputs.device }}
          BUILD: ${{ inputs.build }}

      - name: Check if already committed
        id: check_current
        run: |
          CURRENT=$(cat headers/version.txt 2>/dev/null || echo "none")
          TARGET="iOS ${{ steps.firmware.outputs.version }} (${{ steps.firmware.outputs.build }})"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          if [ "$CURRENT" = "$TARGET" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Already at $TARGET, skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Updating $CURRENT → $TARGET"
          fi

      - name: Download IPSW
        if: steps.check_current.outputs.skip == 'false'
        run: |
          TMPDIR=$(mktemp -d /tmp/ipsw_dl_XXXXXX)
          echo "IPSW_TMPDIR=$TMPDIR" >> $GITHUB_ENV
          echo "Downloading iOS ${{ steps.firmware.outputs.version }} (${{ steps.firmware.outputs.build }}) for ${{ inputs.device }}..."
          ipsw download ipsw \
            --device "${{ inputs.device }}" \
            --build "${{ steps.firmware.outputs.build }}" \
            -o "$TMPDIR"

      - name: Dump headers
        if: steps.check_current.outputs.skip == 'false'
        run: |
          IPSW=$(find "$IPSW_TMPDIR" -name "*.ipsw" | head -1)
          if [ -z "$IPSW" ]; then
            echo "Error: IPSW not found in $IPSW_TMPDIR"
            ls -la "$IPSW_TMPDIR"
            exit 1
          fi
          echo "Using IPSW: $IPSW"
          bash scripts/dump.sh "$IPSW" headers

      - name: Generate browsable site
        if: steps.check_current.outputs.skip == 'false'
        run: python3 scripts/generate_site.py headers

      - name: Collect stats
        if: steps.check_current.outputs.skip == 'false'
        id: stats
        run: |
          FRAMEWORKS=$(find headers -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
          HEADERS=$(find headers -name "*.h" | wc -l | tr -d ' ')
          echo "frameworks=$FRAMEWORKS" >> $GITHUB_OUTPUT
          echo "headers=$HEADERS" >> $GITHUB_OUTPUT

      - name: Clean up downloaded IPSW
        if: always() && env.IPSW_TMPDIR != ''
        run: rm -rf "$IPSW_TMPDIR"

      - name: Create Pull Request
        if: steps.check_current.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ios/${{ steps.firmware.outputs.version }}_${{ steps.firmware.outputs.build }}
          commit-message: >
            iOS ${{ steps.firmware.outputs.version }} (${{ steps.firmware.outputs.build }}) headers
            — ${{ steps.stats.outputs.frameworks }} frameworks, ${{ steps.stats.outputs.headers }} headers
          title: >
            iOS ${{ steps.firmware.outputs.version }} (${{ steps.firmware.outputs.build }})
            — header diff
          body: |
            ## iOS ${{ steps.firmware.outputs.version }} (${{ steps.firmware.outputs.build }})

            | | |
            |---|---|
            | **Device** | `${{ inputs.device }}` |
            | **Frameworks** | ${{ steps.stats.outputs.frameworks }} |
            | **Headers** | ${{ steps.stats.outputs.headers }} |
            | **Previous** | ${{ steps.check_current.outputs.current }} |

            Files changed in this PR show exactly which headers were added, modified, or removed.

            - `A` = 新規追加されたクラス / フレームワーク
            - `M` = 変更されたクラス
            - `D` = 削除されたクラス / フレームワーク
          labels: ios-headers
          delete-branch: false

      - name: Close related issue
        if: steps.check_current.outputs.skip == 'false'
        run: |
          TITLE="iOS ${{ steps.firmware.outputs.version }} (${{ steps.firmware.outputs.build }}) available"
          ISSUE=$(gh issue list \
            --label "new-ios-version" \
            --state open \
            --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" | head -1)
          if [ -n "$ISSUE" ]; then
            gh issue close "$ISSUE" --comment "PR を作成しました。"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
